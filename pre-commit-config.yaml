# Pre-commit hooks for the enterprise-ai-rag-platform monorepo.
# Install:  pip install pre-commit && pre-commit install
# Run all:  pre-commit run --all-files
# Update:   pre-commit autoupdate

minimum_pre_commit_version: "3.5.0"
fail_fast: false
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # --------------------------------------------------------------------------
  # Generic hygiene
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^kubernetes/charts/.*/templates/   # Helm templates aren't valid YAML
      - id: check-json
        exclude: \.vscode/
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # --------------------------------------------------------------------------
  # Terraform
  # --------------------------------------------------------------------------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        exclude: ^infrastructure/modules/   # validate at env root, modules lack provider config
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.config/tflint.hcl
      - id: terraform_checkov
        args:
          - --args=--config-file __GIT_WORKING_DIR__/.config/checkov.yaml
          - --args=--compact
      - id: terraform_trivy
        args:
          - --args=--severity HIGH,CRITICAL

  # --------------------------------------------------------------------------
  # Python — Ruff (lint + format, replaces black/isort/flake8)
  # --------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(services|data-pipeline)/.*\.py$
      - id: ruff-format
        files: ^(services|data-pipeline)/.*\.py$

  # --------------------------------------------------------------------------
  # Python — type checking
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^(services|data-pipeline)/.*\.py$
        additional_dependencies:
          - types-redis
          - types-requests
          - pydantic>=2.0
        args: [--ignore-missing-imports, --no-strict-optional]

  # --------------------------------------------------------------------------
  # Secret scanning
  # --------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.19.2
    hooks:
      - id: gitleaks

  # --------------------------------------------------------------------------
  # Dockerfile linting
  # --------------------------------------------------------------------------
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        files: Dockerfile$

  # --------------------------------------------------------------------------
  # Shell scripts
  # --------------------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # --------------------------------------------------------------------------
  # Kubernetes / Helm manifest validation
  # --------------------------------------------------------------------------
  - repo: https://github.com/norwoodj/helm-docs
    rev: v1.14.2
    hooks:
      - id: helm-docs
        args:
          - --chart-search-root=kubernetes/charts

  # --------------------------------------------------------------------------
  # YAML linting (non-Helm)
  # --------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.config/.yamllint.yaml]
        exclude: ^kubernetes/charts/.*/templates/

  # --------------------------------------------------------------------------
  # Commit message format (Conventional Commits)
  # --------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, chore, docs, refactor, test, ci, build, perf, revert]